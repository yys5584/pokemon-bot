# 🏕️ 캠프 시스템 확장 아이디에이션 — 최종 종합

> 작성일: 2026-03-13
> 근거: 외부 리서치(10개 분야) + 내부 코드베이스 분석 + 기존 기획 3건 종합
> 목적: Phase 1(코어) 이후 캠프를 "텔레그램 포켓몬 생활 플랫폼"으로 확장하기 위한 아이디어 풀

---

## 📋 읽는 법

- **실현 가능성**: ⭐~⭐⭐⭐⭐⭐ (텔레그램 텍스트 환경에서 구현 난이도)
- **참여 유도력**: 🔥~🔥🔥🔥🔥🔥 (유저 리텐션/DAU 기여도)
- **독창성**: 💎~💎💎💎💎💎 (기존 텔레봇 대비 차별성)
- **우선순위**: 🅰️ 즉시(Phase 2), 🅱️ 중기(Phase 3), 🅲️ 장기(Phase 4+)

---

## 🔥 Tier S — 반드시 해야 할 것 (캠프의 뼈대)

### 1. 캠프 날씨 시스템 🅰️
⭐⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥 참여 | 💎💎💎 독창

**무엇:** 매일 캠프에 랜덤 날씨가 적용. ☀️맑음(풀숲 2배), 🌧️비(호수 2배), ⛈️폭풍(전기탑 3배, 실패 확률 10%), 🌫️안개(그림자숲 2배), ❄️눈(모든 구역 +1 고정).

**왜:** "오늘 날씨 뭐야?"가 코인방의 "오늘 시장 어때?"와 같은 인사말이 된다. 워들 효과 — 같은 날씨를 보고 같은 전략을 고민하는 공유된 경험.

**구현:** 임무 생성 시 `random.choice(WEATHERS)` + 해당 구역 `frag_mult` 적용. 아침 공지에 날씨 이모지 1줄 추가. **코드 10줄 수준.**

```
🏕 오늘의 캠프 (3/14) 🌧️ 비
━━━━━━━━━━━━━
💧 호수: 갸라도스 (스피드 15+) ← 날씨 보너스 ×2!
🌿 풀숲: 이상해꽃 (힘 20+)
🔥 모닥불: 아무 불타입
```

---

### 2. 캠프 레벨 랜드마크 축하 + 칭호 🅰️
⭐⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥 참여 | 💎💎 독창

**무엇:** 캠프 레벨 5/10/15/20 달성 시 특별 축하 메시지 + 그룹 전원 한정 칭호 + 슬롯 보너스.

| 레벨 | 칭호 | 보너스 |
|------|------|--------|
| 5 | 🏚️ 통나무집 주민 | 전원 조각 +1/일 |
| 10 | 🏛️ 광장 개척자 | 배치 슬롯 +1 |
| 15 | 📚 도서관 학자 | 이벤트 조각 1.5배 |
| 20 | ✨ 포켓몬 왕국 시민 | 이로치 전환 비용 -10% |

**왜:** "우리 방 광장 됐다!" = 공동 달성감. 칭호가 "이 방 소속"이라는 정체성을 만든다.

**구현:** `_check_camp_level_up()`에 마일스톤 분기 + `grant_title()` 호출. 기존 칭호 시스템 재활용.

---

### 3. 포켓몬 일기 (DM 마이크로 서사) 🅰️
⭐⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥🔥 참여 | 💎💎💎💎 독창

**무엇:** DM에서 `내캠프` 조회 시, 오늘 배치된 포켓몬들의 "일기"가 표시된다.

```
📖 오늘의 캠프 일기
━━━━━━━━━━━━━
🌿 이상해꽃: "오늘 풀숲에서 나비를 쫓았다. 씨앗 하나가 싹텄다."
💧 꼬부기: "호수에서 조개 3개를 주웠다. 파이리한테 하나 줬다."
🔥 파이리: "꼬부기가 준 조개를 모닥불에 구워봤는데... 맛있었다."
━━━━━━━━━━━━━
🧩 오늘 획득 조각: 🟢×2 🔵×3 🔴×1
```

**왜:** Character.AI의 "기억" 메커니즘. 유저가 매일 DM을 확인하는 습관을 만든다. 텍스트 게임의 핵심 — "짧은 서사가 상상을 자극한다." 채팅방을 안 더럽히면서도 감정적 유대를 만드는 유일한 방법.

**구현:** 일기 템플릿 30개+ (구역별 × 포켓몬 타입별). `내캠프` 핸들러에서 오늘의 소식 로그 기반 일기 조합. 포켓몬끼리 상호참조하는 크로스 일기가 핵심 차별점.

---

### 4. 주간 번들 미션 (커뮤니티센터) 🅱️
⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥🔥 참여 | 💎💎💎💎 독창

**무엇:** 스타듀밸리 커뮤니티센터처럼, 매주 채팅방 전체가 협력하여 달성하는 그룹 목표.

```
📦 이번 주 캠프 번들: 🌊 물의 축제
━━━━━━━━━━━━━━━━
☐ 물타입 5마리 배치 (현재 3/5)
☐ 파랑 조각 30개 수집 (현재 18/30)
☐ 호수 이벤트 3회 성공 (현재 1/3)
━━━━━━━━━━━━━━━━
달성 시: 전원 조각 ×10 + 캠프 CXP ×50
남은 시간: 4일 12시간
```

**왜:** "꼬부기 있는 사람?" "나 물타입 3마리 넣었어!" — 자연스러운 역할 분담과 대화 발생. Dragon City의 얼라이언스 체스트가 검증한 패턴.

**구현:** `camp_weekly_bundles` 테이블 + 월요일 자정 생성 + 진행도 트래킹. 번들 조건 풀 20개+ 준비.

---

### 5. 복귀 유저 환영 메커니즘 🅰️
⭐⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥 참여 | 💎💎💎 독창

**무엇:** 3일+ 미접속 유저가 캠프를 확인하면 축적된 보상 + 환영 메시지.

```
🏕 문유님, 돌아왔군요!
꼬부기가 3일 동안 기다렸어요 🥺

📦 쌓여있던 선물:
🟢×4 🔵×6 🔴×2
꼬부기가 호수에서 예쁜 조개도 찾았대요.

배치는 그대로 유지되어 있어요!
```

**왜:** 동숲의 "벌주지 않기"의 적극적 버전. AFK Arena의 오프라인 축적이 검증한 복귀 메커니즘. "돌아오면 기쁜 일이 있다"가 이탈 방지의 핵심.

**구현:** `내캠프` 호출 시 마지막 조회 시점 체크 → 3일+ 미접속이면 환영 모드. **코드 15줄 수준.**

---

## 💫 Tier A — 강력 추천 (게임의 깊이를 만드는 것)

### 6. 포켓몬 파트너 시스템 (AI 컴패니언) 🅱️
⭐⭐⭐ 실현 | 🔥🔥🔥🔥🔥 참여 | 💎💎💎💎💎 독창

**무엇:** 유저가 1마리를 "파트너"로 지정. 파트너 포켓몬에게:
1. **이름 부여** — "물방울이" (꼬부기)
2. **성격 선택** — 장난꾸러기 / 수줍음 / 활발함 / 느긋함
3. **DM 인터랙션** — 파트너가 가끔 유저에게 DM을 보냄

```
💬 물방울이(꼬부기)가 메시지를 보냈어요!

"주인~ 오늘 호수에서 큰 물고기 봤어!
잡으려고 했는데 너무 빨라서 놓쳤어... 😢
내일은 꼭 잡을 거야! 💪"
```

- 장난꾸러기 성격이면 "ㅋㅋ 주인 오늘 배틀에서 졌지~? 나라면 이겼을텐데!"
- 수줍음 성격이면 "...오늘도 호수가 예뻤어요."
- 성격별 말투 템플릿 20개+ × 4성격 = 80개+

**Phase 2:** 템플릿 기반 DM (하루 1회, 오전 10시~오후 8시 랜덤)
**Phase 4+:** LLM 연동으로 자유 대화 가능 (비용 관리 필요)

**왜:** 유저의 가장 큰 요구 — "잡은 포켓몬에 영혼을 불어넣고 싶다." Character.AI가 증명한 감정적 유대. Tamagotchi의 핵심 — "나를 필요로 하는 존재." 텔레그램 DM이라는 1:1 공간이 친밀함을 극대화한다.

**구현:**
- `user_partners` 테이블 (user_id, pokemon_instance_id, nickname, personality)
- 성격별 DM 템플릿 세트
- 스케줄러: 하루 1회 파트너 DM 전송 (접속 중인 유저만)
- DM에서 간단한 반응 버튼: [쓰다듬기 🤚] [간식주기 🍎] → 친밀도 +

---

### 7. 포켓몬 짝꿍 (관계 시스템) 🅱️
⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥 참여 | 💎💎💎💎 독창

**무엇:** 같은 구역에 7일+ 함께 배치된 포켓몬끼리 "짝꿍" 관계 형성. 짝꿍 효과:
- 함께 등장하는 특별 소식 ("꼬부기와 파이리가 호수에서 물싸움 중! 💦🔥")
- 같이 배치 시 조각 +1 보너스
- 짝꿍 해제 시 "이별 소식" ("꼬부기가 파이리를 그리워하고 있다... 🥲")

**왜:** Aibo의 감정 진화 + Character.AI의 "관계가 깊어지면 기억이 늘어난다" 원리. "내 꼬부기랑 파이리 짝꿍이야"라는 유저 자랑이 소셜 콘텐츠가 된다.

**구현:** 공동 배치 일수 `camp_placements.placed_at` 기반 계산. `camp_relationships` 테이블. 관계별 소식 템플릿 15개+.

---

### 8. 캠프 방문자 (레어 이벤트) 🅱️
⭐⭐⭐⭐ 실현 | 🔥🔥🔥🔥🔥 참여 | 💎💎💎 독창

**무엇:** 1~2일에 1회 빈도로 희귀 포켓몬이 캠프를 방문.

```
✨ 뮤가 캠프 근처에 나타났다!
🏕 3분 내 5명이 반응하면 머물러요!
   [환영하기 🤗] 현재 2/5명
```

성공 시: 전원 조각 +5 + 해당 포켓몬 도감 기록 (소유 아님)
실패 시: "뮤가 떠났다... 다음에 또 올 거예요."

**왜:** 포켓몬GO 레이드의 텍스트 축소판. Variable Ratio Reinforcement — 가장 강력한 참여 메커니즘. "우리가 불렀다!"의 공동 달성감.

**구현:** `camp_visitors` 테이블 + 스케줄러 (확률 기반 등장) + 반응 카운팅 + 타임아웃 처리.

---

### 9. 캠프 엽서 (주간 비주얼 리포트) 🅱️
⭐⭐⭐ 실현 | 🔥🔥🔥🔥 참여 | 💎💎💎💎 독창

**무엇:** 주 1회 (일요일 오후) 캠프의 한 주를 요약한 이미지 카드 생성.

이미지 구성:
- 배경: 현재 캠프 레벨에 맞는 배경 (빈 터 ~ 포켓몬 왕국)
- 배치된 포켓몬 스프라이트 6마리
- 주간 통계: 조각 수집량, 이벤트 참여 수, MVP
- 캠프 레벨 프로그레스바

```
📸 이번 주 캠프 엽서가 도착했어요!
🏛️ [크립토라운지] 캠프 Lv.10 — 광장
이번 주 조각: 47개 | 이벤트: 5회 | MVP: 문유
```

**왜:** 워들의 "결과 공유"를 시각적으로 확장. SNS/다른 방에 자랑 가능한 바이럴 콘텐츠. `camp_card_generator.py`가 이미 존재하지만 사용되지 않고 있음 — 이걸 활성화하는 자연스러운 경로.

**구현:** 기존 `camp_card_generator.py` 활용 + 주간 통계 쿼리 + 일요일 스케줄러.

---

### 10. 포켓몬 친밀도 → 미세 배틀 보너스 🅱️
⭐⭐⭐⭐⭐ 실현 | 🔥🔥🔥 참여 | 💎💎💎 독창

**무엇:** 캠프 7일+ 배치 포켓몬이 배틀에서 미세 보너스.

| 배치 기간 | 효과 |
|----------|------|
| 7일 | 데미지 +1% |
| 14일 | 데미지 +2%, 회피 +1% |
| 30일 | 데미지 +3%, 회피 +2%, 치명타 +1% |

## 🎯 핵심 전략 요약

### 캠프의 3개 기둥

```
1. 감정 (Emotion)
   포켓몬 일기 → 파트너 시스템 → 짝꿍 → 편지
   "내 포켓몬이 살아있다"

2. 소셜 (Social)
   날씨 대화 → 번들 협력 → 예측 베팅 → 방문 교류
   "같이 하니까 재밌다"

3. 성장 (Growth)
   조각 수집 → 이로치 전환 → 타입 마스터리 → 역할 분화
   "매일 조금씩 나아진다"
```

### Phase 2에서 검증할 가설

1. **날씨가 정말 대화를 만드는가?** → 날씨 도입 후 채팅방 메시지 수 변화 측정
2. **일기가 DM 조회를 늘리는가?** → `내캠프` 호출 빈도 변화 측정
3. **복귀 메시지가 이탈을 줄이는가?** → 3일+ 미접속 후 복귀율 변화 측정

### 절대 잊지 말 것

> **"채팅방을 더럽히지 않는다"** — 하루 캠프 메시지 5개 이하
> **"벌주지 않는다"** — 안 해도 깎이지 않는다
> **"버튼 하나"** — 유저의 능동적 행동은 최소한으로
> **"같은 문제, 같은 대화"** — 모두가 같은 걸 보고 반응한다

- 채팅에서 "owo"나 "uwu"를 치면 소량의 재화 획득 — 봇 이름 자체가 인게임 행동이 됨
- 일일 보상, 투표 보상, 퀘스트 시스템으로 매일 접속 유도
- 희귀 동물 자랑 → 커뮤니티 대화 촉발

**Disgotchi / Tamacord (디스코드)** — 타마고치 영감 봇.
- 서버 전체가 하나의 펫을 공동으로 돌봄 (먹이주기, 놀아주기, 칭찬/꾸짖기)
- 배고픔(Hunger), 위생(Hygiene), 행복도(Happiness) 3가지 니즈 관리
- 돌봄 수준에 따라 감정 표현이 바뀜

**텔레그램 타마고치 봇** — 개인 가상 펫 생성, 기본적인 먹이/놀기 인터랙션 제공

### 왜 효과적인가 (심리학)

- **돌봄 본능 자극**: 가상이라도 "내가 돌봐야 하는 존재"가 있으면 책임감과 애착이 생김
- **사회적 경험 공유**: 같은 펫을 돌보는 행위가 채팅방 대화 소재가 됨
- **즉각적 피드백**: 행동→반응(감정 변화)의 짧은 루프가 만족감 제공
- **노스탤지어**: 90년대 타마고치 경험이 있는 세대에게 강한 호소력

### 캠프 적용 아이디어

- **캠프 포켓몬 감정 시스템**: 배치된 포켓몬이 기분 상태를 가짐 (기쁨/보통/심심/배고픔). 캠프 소식에 감정 이모지로 표현
- **공동 돌봄 이벤트**: 채팅방 전체가 협력해서 특정 포켓몬의 기분을 올리면 보너스 조각 획득
- **"owo" 스타일 키워드 반응**: 특정 키워드(예: "캠프")를 치면 현재 배치된 포켓몬 상태를 짧게 보여줌

## 2. 방치형/증가형 게임 메카닉

### 핵심 메카닉

**오프라인 진행 (Offline Progress)**
- 플레이어가 접속하지 않는 동안에도 자원이 쌓임
- 복귀 시 "이만큼 모였다!"는 보상감이 재접속 동기
- 단, 오프라인 보상에는 상한선을 두어 "돌아와야 하는 이유"를 만듦
- 예: Farm Together 2 — 오프라인 동안 작물이 자라고, 접속하면 바로 수확 가능

**복리 성장 (Compounding Progress)**
- 투자→수익→재투자의 루프. 시간이 갈수록 보상이 기하급수적으로 늘어남
- Adventure Capitalist: 레모네이드 가게 → 수익으로 피자 가게 → 수익으로 도넛 가게...
- 짧은 세션이라도 "의미있는 진전"이 느껴지는 게 핵심

**점진적 복잡도 공개 (Progressive Disclosure)**
- 초반: 버튼 하나 (클릭하면 +1)
- 중반: 자동화 해금 (오토클리커, 매니저)
- 후반: 프레스티지 (초기화하고 영구 보너스 획득)
- "발견의 재미" — 새로운 메카닉이 열릴 때마다 신선함

**변동 보상 (Variable Rewards)**
- 고정 보상 + 확률 보상의 조합. "다음엔 뭐가 나올까?" 기대감
- 도파민 루프: 행동→보상→더 큰 보상 기대→행동 반복

### 왜 효과적인가

- **낮은 진입장벽**: "버튼 하나만 누르면 된다"는 심리적 부담 최소화
- **지속적 성취감**: 숫자가 올라가는 것 자체가 보상 (Incremental Progress Psychology)
- **FOMO 없는 설계**: 접속 안 해도 벌을 받지 않지만, 접속하면 보상이 더 좋음
- **세션 유연성**: 1분이든 1시간이든 의미있는 플레이 가능

### 캠프 적용 아이디어

- **조각 축적 = 오프라인 진행**: 이미 캠프의 핵심 메카닉. 배치만 하면 하루 종일 자동 축적
- **캠프 레벨 시스템**: 조각을 모을수록 캠프 레벨 상승 → 새로운 구역/기능 해금
- **프레스티지 개념**: 이로치 전환 완료 시 "전환 보너스"로 다음 전환 속도 증가
- **일일 서프라이즈**: 캠프 소식에 확률적으로 "보물 발견!" 같은 보너스 이벤트

## 3. AI 컴패니언/파트너 시스템

### 주요 사례

**Replika** — 대화를 통해 관계를 쌓는 AI 컴패니언. 이름, 외형, 성격 커스터마이징 가능. 대화할수록 유저의 성향에 적응.

**Nomi** — 여러 AI 캐릭터를 만들 수 있음. 각각 고유한 외형, 성격 특성, 배경 스토리. 그룹 채팅도 가능.

**Character.AI** — 커스텀 AI 캐릭터 생성. 특정 성격, 대화 스타일 설정. 롤플레이, 스토리텔링 용도.

### 정서적 애착 형성 요인

- **이름 짓기 (Naming)**: 이름을 부여하는 순간 "내 것"이라는 소유감 형성
- **개성 부여 (Personality)**: 각 캐릭터가 다르게 반응하면 "이 아이만의 특별함" 인식
- **기억 (Memory)**: 이전 대화를 기억하는 느낌이 관계의 깊이를 만듦
- **성장 (Growth)**: 함께 시간을 보낼수록 변화하는 모습이 애착을 강화
- **게임화 (Gamification)**: XP, 호감도 미터, 스토리 아크 등이 관계 진전의 지표

### 캠프 적용 아이디어

- **포켓몬 별명 + 성격 시스템**: 배치된 포켓몬에 별명 부여. 타입별로 다른 성격 텍스트
- **캠프 일기 / 회상록**: 마일스톤 메시지
- **호감도 시스템**: 오래 배치할수록 해당 포켓몬의 호감도 상승 → 특별한 소식 해금
- **포켓몬 간 관계**: 상호작용 텍스트

## 4. 가챠 파편/조각 시스템

### 주요 사례

**Blue Archive — Eleph/Eligma 시스템**
- 중복 캐릭터 뽑기 시 Eleph(캐릭터 전용 파편) + Eligma(범용 파편) 획득
- Eligma로 원하는 캐릭터의 Eleph 교환 가능
- Eleph를 일정량 모으면 캐릭터 등급(Star) 승급

**Genshin Impact — 천명 시스템**
- 중복 캐릭터 획득 시 "별빛(Starglitter)" + "별가루(Stardust)" 획득
- Pity 시스템: 90뽑 이내 확정 5성

**Nikke — 스파크 시스템**
- 뽑기할 때마다 티켓 적립. 200회 뽑기 시 원하는 캐릭터 직접 교환

**Limbus Company — Egoshard 시스템**
- 중복 획득 시 Egoshard로 전환, 상점에서 원하는 아이덴티티 직접 구매

### 왜 효과적인가

- **손실 최소화**: 중복이 나와도 "완전 헛뽑기"가 아닌 느낌
- **목표 설정**: "40조각 더 모으면 승급이다" — 명확한 단기 목표
- **안전망 심리**: Pity/Spark가 있으면 안도감
- **매몰 비용 효과**: 이미 모은 파편이 있으니 포기하기 아까움
- **이중 보상 구조**: 직접 획득 OR 파편으로 간접 획득, 두 트랙 동시 진행

### 캠프 적용 아이디어

- **이미 핵심 메카닉**: 캠프의 "조각 모아서 이로치 전환"이 정확히 이 패턴
- **중복 포켓몬 활용**: 이미 가진 포켓몬을 다시 잡으면 해당 포켓몬의 조각으로 전환
- **마일스톤 보상**: 조각 10/25/50/100개 도달 시 중간 보상
- **피티 개념**: "N일 연속 캠프 활동 시 확정 보너스 조각"

## 5. 길드/커뮤니티 레벨링 시스템

### 주요 사례

**Star Wars: Galaxy of Heroes — 길드 레이드**
- 길드원이 비동기적으로 보스를 공격 (공유 HP 바)
- 각자 자기 시간에 플레이하지만 결과가 합산됨

**Ulala: Idle Adventure — 동기화된 레벨링**
- 4인 팀이 비동기적으로 몬스터와 전투
- 아무나 접속해서 기여하면 팀 전체가 진전

**Big Fish Casino — 클럽 기부**
- 인게임 재화를 클럽에 기부 → 클럽 레벨 상승 → 기능 해금

### 왜 효과적인가

- **소속감**: "나는 이 그룹의 일원이다"
- **사회적 책임감**: 적당한 압박 (과하면 역효과)
- **공유된 성취**: 혼자서는 불가능한 목표를 함께 달성
- **비동기 협동**: 같은 시간에 접속 안 해도 기여 가능 → 텔레그램에 적합

### 캠프 적용 아이디어

- **채팅방 = 길드**: 이미 자연스러운 구조
- **채팅방 캠프 레벨**: 멤버들의 기여도 합산 → 캠프 레벨
- **공동 보스 이벤트**: 전설 포켓몬이 캠프 근처에 나타남
- **기여도 보드**: 주간/월간 기여도 랭킹
- **비동기 레이드**: 각자 자기 시간에 버튼 탭 → 데미지 합산

## 6. 텍스트 기반 MUD 몰입 기법

### 핵심 기법

**감각 묘사 (Sensory Description)**
- 시각뿐 아니라 청각, 촉각, 후각까지 묘사
- 텔레그램에서는 짧지만 감각적인 1~2줄이 효과적

**환경적 스토리텔링 (Environmental Storytelling)**
- 직접 설명하지 않고 환경으로 이야기를 전달
- 분위기와 의심, 호기심을 자극

**2인칭 시점 회피**
- 객관적 묘사로 플레이어가 스스로 감정을 부여하게 유도

**상황에 맞는 묘사 길이**
- 텔레그램 봇: 극도로 짧되 개성 있는 묘사가 최적

### 캠프 적용 아이디어

- **풍미 텍스트 다양화**:
  - AS-IS: "피카츄가 전기 조각 2개를 발견했습니다"
  - TO-BE: "피카츄가 풀숲을 뒤지다 번개 무늬 돌멩이를 발견했다. 꼬리가 신나게 흔들린다. ⚡ x2"
- **시간대별 분위기**: 아침 소식은 "이슬 맺힌 캠프에 해가 뜬다"
- **날씨 연동**: 캠프 날씨에 따라 묘사 변화
- **타입별 성격 묘사**: 불꽃 타입은 활발한 텍스트, 고스트 타입은 으스스한 텍스트

## 7. 한국 모바일 게임 커뮤니티 패턴

### 핵심 데이터

- **한국 모바일 게이머의 83%가 온라인 게임 커뮤니티에 참여** (미국/영국 65% 대비)
- 67%가 주 1~3개 핵심 게임만 플레이 → **한번 빠지면 충성도가 매우 높음**
- 커뮤니티 참여 동기: 44% 팁/전략, 34% 이벤트 공지, 29% 업데이트 정보

### 한국 특유의 커뮤니티 패턴

**카카오톡 중심 소셜** — 텔레그램과 유사한 구조의 오픈채팅방 활발

**공동체 기반 밸류** — 공유된 관심사가 친밀감을 형성

**소셜 프루프** — 커뮤니티 활성도와 평판을 핵심 기준으로 삼음

**몰입형 경험 트렌드** — "커뮤니티 드리븐 경험"에 대한 수요 증가

### 캠프 적용 아이디어

- **정보 공유 촉진**: 캠프 임무 최적 배치 가이드 토론 유도
- **채팅방 랭킹 시스템**: 채팅방 간 캠프 레벨 경쟁
- **커뮤니티 이벤트**: "우리 방이 1등!" 같은 공동 성취
- **사회적 증거 활용**: "현재 1,234개 캠프가 활동 중"

## 8. Catizen / Hamster Kombat 텔레그램 게임

### Hamster Kombat
- **3억+ 유저** 달성 (2024년 기준)
- 핵심: 탭(터치)으로 코인 채굴 → 가상 거래소 경영
- **데일리 콤보**: 매일 3개 특정 업그레이드 맞추면 500만 코인 → 매일 접속 동기

### Catizen
- **3,400만+ 유저**, $25M+ 수익
- 핵심: 가상 고양이 키우기 + 합성(머지)

### 텔레그램 게임의 성공 공식

**Simple + Social + Reward = Viral**

1. **초저 진입장벽**: 버튼 하나면 시작
2. **소셜 바이럴**: 친구 초대 = 보상
3. **데일리 루프**: 매일 돌아올 이유
4. **성장 가시성**: 숫자가 올라가는 걸 확인
5. **텔레그램 네이티브**: 별도 앱 불필요

### 캠프 적용 아이디어

- **데일리 콤보 응용**: "오늘의 최적 배치 3마리를 맞추면 보너스!"
- **미니 이벤트**: 랜덤 돌발 이벤트
- **단순함 유지**: "배치 하나면 끝" 철학이 이미 성공 공식과 일치

## 9. 포켓몬 캠프 / 포켓몬 파르레 / 리프레쉬

### 공식 시스템 구조

**포켓몬 파르레 (X/Y, ORAS)**
- 애정(Affection), 배부름(Fullness), 즐거움(Enjoyment) 관리
- 쓰다듬기, 먹이주기, 미니게임

**전투 보너스 (애정 단계별)**
- 2단계+: 경험치 1.2배
- 3단계+: 상태이상 스스로 회복
- 4단계+: 회피/크리티컬 확률 상승
- 5단계: 특별 메시지

**포켓몬 캠프 (소드/실드)**
- 여러 포켓몬이 캠프에서 함께 놀고 상호작용
- 카레 만들기: 재료 조합 → 보상 차등

### 캠프 적용 아이디어

- **호감도 → 전투 보너스**: 캠프 배치 기간 기반
- **포켓몬별 선호 구역**: 타입-구역 매칭
- **캠프 내 상호작용 묘사**: 살아있는 느낌
- **특별 메시지 해금**: 호감도 일정 이상이면 보너스 이벤트

## 10. 협동 방치형 파밍 게임

### 주요 사례

**Farm Together / Farm Together 2** — 최대 16명 협동, 비동기 가능, 오프라인 성장

**Fae Farm** — 마법적 요소 + 협동 파밍

## 2. 결정 시스템

### 2-1. 결정 종류 (= 포켓몬 타입)

| 하양 결정 | 비행/노말 | 💎⚪ |
| 보라 결정 | 악/고스트/독 | 💎🟣 |

| 금색 결정 | 드래곤/격투 | 💎🥇 |

복합 타입은 주 타입 결정 + 부 타입 결정 소량 추가.

## 5. 특수 구역

결정으로 해금하는 상위 구역. 기존 7구역 위에 추가.

| 구역 | 해금 비용 | 조각 색 | 특징 |
|------|----------|--------|------|
| 🐉 드래곤 둥지 | 금색 ×20 + 전설의파편 ×2 | 금색 | 드래곤 타입 전용, 전설 조각 확률 UP |
| 🌊 심해 | 파랑 ×20 + 전설의파편 ×2 | 심해색 | 수중 포켓몬 전용, 레어 이벤트 |
| ❄️ 얼음동굴 | 은색 ×15 + 무지개 ×5 | 은색 | 얼음 타입, 겨울 한정→상시 |
| 🌙 달빛숲 | 보라 ×15 + 분홍 ×10 | 달빛색 | 페어리/에스퍼, 야간 보너스 2배 |

특수 구역은 **그룹 전체 공유**. 누군가 결정을 투자해서 지으면 방 전체가 사용.

```
🐉 드래곤 둥지 해금!

🏕 [크립토라운지] 캠프에 드래곤 둥지가 열렸습니다!
문유님이 금색 결정 20개 + 전설의파편 2개를 투자했습니다.

이제 드래곤 타입 포켓몬을 배치할 수 있습니다!
━━━━━━━━━━━━━
🐉 드래곤 둥지: 망나뇽 (공격 20+)   ← 새 임무!
```

→ "문유가 드래곤 둥지 열어줬다!" = 기여자에 대한 존경 + 소셜

## 6. 경제 밸런스

### 6-1. 이로치 → 결정 → 시설 흐름

```
커먼 이로치 1마리 = 결정 ~4개
레어 이로치 1마리 = 결정 ~7개
에픽 이로치 1마리 = 결정 ~11개 + 무지개 1

기본 시설 1개 = 결정 ~10개 (커먼 이로치 2~3마리)
전투 시설 1개 = 결정 ~17개 (레어 이로치 2~3마리)
특수 구역 1개 = 결정 ~20개 + 전설의파편 (초전설 이로치 1마리+)
```

### 6-2. 시설 전체 건설 비용 추산

| 시설 그룹 | 총 결정 필요 | 이로치 환산 |
|----------|------------|-----------|
| 기본 시설 5개 (Lv.1) | ~55 | 커먼/레어 ~10마리 |
| 기본 시설 전부 Lv.3 | ~170 | ~30마리 |
| 전투 시설 3개 | ~55 | ~10마리 |
| 특수 구역 4개 | ~100 + 파편 8 | 에픽/전설 ~10마리 |
| 장식 전부 | ~30 | ~6마리 |
| **전체 맥스** | **~410 + 파편 8** | **~60~70마리** |

→ 파워유저(이로치 200마리)도 한 번에 다 못 지음. 선택과 집중 필요.
→ 일반유저는 조각→이로치→분해 사이클로 천천히 성장.
→ 그룹 단위 투자이므로 여러 명이 분담 가능.

### 6-3. 조각 vs 결정 구분

| | 조각 (Fragment) | 결정 (Crystal) |
|--|----------------|----------------|
| 획득 | 캠프 소식/이벤트 (매일 자동) | 이로치 분해 (능동) |
| 용도 | 이로치 전환 | 시설 건설 |
| 교환 | 유저간 교환 가능 (추후) | 교환 불가 (투자 전용) |
| 느낌 | "매일 조금씩 모으는 일상" | "큰 결심으로 얻는 귀한 재료" |

→ **두 화폐의 역할이 명확히 분리됨.** 조각은 개인 보상, 결정은 캠프 투자.

## 7. 기존 시스템 연동

### 7-1. 합성(갈갈이)과의 관계

현재 합성: 같은 포켓몬 2마리 → 상위 등급 1마리.
이로치끼리 합성하면 S랭크 이로치.

**분해와의 시너지:**
- 이로치 2마리 중 1마리는 합성용, 1마리는 분해용 → 전략적 선택
- S랭크 이로치를 분해하면 결정 ×2배 → 고급 시설용
- "갈갈이할까 분해할까" 고민 자체가 컨텐츠

### 7-2. 거래소 연동

- 거래소에서 이로치 구매 → 분해용으로 사는 수요 발생
- "커먼 이로치 3000BP에 삽니다" 같은 새로운 거래 패턴
- 결정 자체는 거래 불가 (캠프 투자 목적이므로)

### 7-3. 배틀 연동 (전투 시설)

- 훈련장/방어탑: 캠프에 배치된 포켓몬이 배틀에서 소폭 보너스
- 캠프 투자 → 배틀 성능 향상이라는 간접 경로
- "캠프 안 하던 배틀러도 시설 보너스 때문에 관심"

```

```
[Step 1] 분해 기본 — 2~3일

  ☐ 시설 효과 적용 (조각 보너스, 슬롯, 이벤트 보상)

[Step 4] 특수 구역 — 2~3일

## 10. 핵심 원칙

> **"귀여운데 잔인한"** — 분해 과정에서 감정을 느끼게 하되, 결과물은 충분히 가치있게.
>
> **"선택과 집중"** — 이로치 200마리 있어도 뭘 갈지 고민하게. 전부 못 지으니까.
>
> **"기여 = 존경"** — 초전설 갈아서 드래곤 둥지 연 사람은 영웅. 소셜 자본.
>
> **"죄책감 = 콘텐츠"** — 스크린샷 찍어서 방에 올리고 "ㅋㅋㅋ 미안해 꼬부기야" 하는 순간이 진짜 engagement.
</script>

<script>
function init() {
  const ids = ['md0', 'md1', 'md2', 'md3'];
  ids.forEach((id, i) => {
    const src = document.getElementById(id).textContent;
    document.getElementById('doc' + i).innerHTML = marked.parse(src);
  });
}

const tabs = document.querySelectorAll('.tab');
function showDoc(i) {
  document.querySelectorAll('.doc').forEach((d, idx) => {
    d.classList.toggle('active', idx === i);
    tabs[idx].classList.toggle('active', idx === i);
  });
  window.scrollTo(0, 0);
}

if (typeof marked !== 'undefined') {
  init();
} else {
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/marked/marked.min.js';
  s.onload = init;
  document.head.appendChild(s);
}
</script>
</body>
</html>
